# =============================================
# Tmux Configuration - Cross-platform (WSL/macOS)
# =============================================

# -------------------------
# General Settings
# -------------------------

# Set prefix to Ctrl+a (instead of Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Set terminal to true color
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col:Tc"

# Enable mouse support
set -g mouse on

# Set escape time
set -sg escape-time 0

# Set history limit
set -g history-limit 50000

# Enable vi mode for copy mode
setw -g mode-keys vi

# -------------------------
# Window Settings
# -------------------------

# Set window title
set -g set-titles on
set -g set-titles-string "#T"

# Renumber windows when closing
set -g renumber-windows on

# Window status format
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# -------------------------
# Status Bar
# -------------------------

# Set status bar height
set -g status-style "fg=colour250,bg=colour236"

# Left side of status bar
set -g status-left "[#S] "
set -g status-left-length 30

# Right side of status bar
set -g status-right " %Y-%m-%d %H:%M "
set -g status-right-length 50

# -------------------------
# Pane Settings
# -------------------------

# Pane border style
set -g pane-border-status top
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour117"

# Pane separator
set -g pane-border-lines single

# -------------------------
# Key Bindings
# -------------------------

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Quick save buffer
bind C-s capture-pane \; save-buffer ~/.tmux-buffer \; display-message "Buffer saved!"

# -------------------------
# Plugin Manager (TPM)
# -------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tprefix'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com/user/plugin'
# set -g @plugin 'git@bitbucket.org/user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# -------------------------
# Platform-specific Settings
# -------------------------

# Detect WSL
shell-command = 'uname -r'
if-shell 'uname -r | grep -qi microsoft' 'set -g @is_wsl 1' 'set -g @is_wsl 0'

# macOS specific
if-shell '[ "$(uname)" = "Darwin" ]' 'set -g @is_macos 1' 'set -g @is_macos 0'

# WSL clipboard integration
if-shell '[ "$(uname -r | grep -ci microsoft)" -gt 0 ]' 'bind C-c run-shell "tmux save-buffer - | clip.exe"'

# macOS clipboard integration
if-shell '[ "$(uname)" = "Darwin" ]' 'bind C-c run-shell "tmux save-buffer - | pbcopy"'
